<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Liberdus Wallet Core Demo</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f9fafb;
      }
    </style>
  </head>
  <body>
    <div id="walletButton"></div>
    <script type="module">
      import { createWalletConnectButton } from "./index.js";

      createWalletConnectButton({
        target: document.getElementById("walletButton"),
        onConnect({ account }) {
          console.log("connected", account);
        },
        onDisconnect() {
          console.log("disconnected");
        },
        onError(error) {
          console.error(error);
        },
      });
    </script>
  </body>
</html>
