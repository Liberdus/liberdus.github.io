<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#ffffff" />

    <title>Liberdus BSC Bridge</title>

    <link rel="icon" type="image/png" href="./assets/logo.png" />

    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/header.css" />
    <link rel="stylesheet" href="./css/tabs.css" />
    <link rel="stylesheet" href="./css/bridge-module.css" />
    <link rel="stylesheet" href="./css/wallet-popup.css" />
    <link rel="stylesheet" href="./css/notifications.css" />
  </head>

  <body>
    <div id="bootstrap-loading" class="modal-backdrop">
      <div class="modal">
        <div class="modal-body">
          <div class="notification-icon" aria-hidden="true"><span class="spinner"></span></div>
          <div class="card-title" data-bootstrap-title>Loading latest version.</div>
        </div>
      </div>
    </div>

    <script src="./libs/ethers.umd.min.js"></script>
    <script src="./js/bootstrap.js" type="module"></script>

    <div class="container" id="app">
      <header class="header" id="header">
        <div class="header-toolbar">
          <a
            href="https://liberdus.com"
            target="_blank"
            rel="noopener"
            class="logo-link"
            aria-label="Visit Liberdus website"
          >
            <img class="logo" src="./assets/logo.png" alt="Liberdus logo" />
          </a>
          <div class="logo-text">
            <div class="app-title">Liberdus BSC Bridge</div>
            <div class="app-subtitle-row">
              <span class="app-subtitle">Polygon Vault</span>
              <span class="app-version"></span>
            </div>
          </div>

          <nav class="nav-section" aria-label="Header actions">
            <button
              id="connect-wallet-btn"
              class="connect-wallet-btn"
              type="button"
              title="Connect wallet"
            >
              Connect Wallet
            </button>
          </nav>
        </div>
      </header>

      <main class="main" id="main-content">
        <section class="tabs" aria-label="Main tabs">
          <div class="tab-bar" role="tablist" aria-label="Liberdus BSC Bridge tabs">
            <button
              class="tab-button is-active"
              role="tab"
              aria-selected="true"
              aria-controls="tab-panel-bridge"
              id="tab-bridge"
              data-tab="bridge"
              type="button"
            >
              Bridge
            </button>
            <button
              class="tab-button"
              role="tab"
              aria-selected="false"
              aria-controls="tab-panel-transactions"
              id="tab-transactions"
              data-tab="transactions"
              type="button"
            >
              Transactions
            </button>
            <button
              class="tab-button"
              role="tab"
              aria-selected="false"
              aria-controls="tab-panel-info"
              id="tab-info"
              data-tab="info"
              type="button"
            >
              Info
            </button>
            <button
              class="tab-button"
              role="tab"
              aria-selected="false"
              aria-hidden="true"
              aria-controls="tab-panel-operations"
              id="tab-operations"
              data-tab="operations"
              tabindex="-1"
              hidden
              type="button"
            >
              Admin
            </button>
          </div>

          <div class="tab-panels">
            <section
              class="tab-panel is-active"
              id="tab-panel-bridge"
              role="tabpanel"
              aria-labelledby="tab-bridge"
              tabindex="0"
              data-panel="bridge"
            ></section>

            <section
              class="tab-panel"
              id="tab-panel-operations"
              role="tabpanel"
              aria-labelledby="tab-operations"
              tabindex="0"
              hidden
              data-panel="operations"
            ></section>

            <section
              class="tab-panel"
              id="tab-panel-transactions"
              role="tabpanel"
              aria-labelledby="tab-transactions"
              tabindex="0"
              hidden
              data-panel="transactions"
            ></section>

            <section
              class="tab-panel"
              id="tab-panel-info"
              role="tabpanel"
              aria-labelledby="tab-info"
              tabindex="0"
              hidden
              data-panel="info"
            ></section>
          </div>
        </section>
      </main>

      <footer class="footer">
        <div class="footer-inner">
          <div class="footer-left">
            <span>(c) Liberdus</span>
            <span class="footer-sep">|</span>
            <a href="https://github.com/Liberdus" target="_blank" rel="noopener">GitHub</a>
          </div>
        </div>
      </footer>

      <div id="notification-container" class="notification-container"></div>
    </div>

    <div id="wallet-popup-container"></div>
  </body>
</html>
